<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
    <!-- Внешний силовой контур -->
    <polygon points="50,5 90,20 90,60 50,95 10,60 10,20" fill="none" stroke="currentColor" stroke-width="4" stroke-linejoin="round"/>
    
    <!-- Внутренняя бронеплита (Перекачка энергии) -->
    <polygon points="50,18 75,29 75,55 50,82 25,55 25,29" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round" opacity="0.6">
        <animate attributeName="opacity" values="0.2;0.8;0.2" dur="3s" repeatCount="indefinite" />
    </polygon>
    
    <!-- Центральное ядро защиты (Пульсация) -->
    <polygon points="50,35 60,45 50,70 40,45" fill="currentColor" opacity="0.9">
        <animateTransform attributeName="transform" type="scale" values="0.95; 1.05; 0.95" dur="2s" repeatCount="indefinite" transform-origin="50 52.5" />
    </polygon>
    
    <!-- Технические насечки -->
    <line x1="10" y1="20" x2="30" y2="10" stroke="currentColor" stroke-width="2" opacity="0.5"/>
    <line x1="90" y1="20" x2="70" y2="10" stroke="currentColor" stroke-width="2" opacity="0.5"/>
</svg>
