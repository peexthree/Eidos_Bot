<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" id="svg-sync" width="100%" height="100%">
                <defs>
                    <filter id="glow-sync">
                        <feGaussianBlur stdDeviation="1.5" result="blur" />
                        <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
                    </filter>
                    <style>
                        @keyframes spin-sync { 100% { transform: rotate(360deg); } }
                        @keyframes pulse-sync { 0%, 100% { transform: scale(1); opacity: 0.7; } 50% { transform: scale(1.1); opacity: 1; } }
                        @keyframes float-sync { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-3px); } }
                        @keyframes blink-sync { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
                        @keyframes draw-sync { 0% { stroke-dashoffset: 50; opacity: 0.5; } 50% { stroke-dashoffset: 0; opacity: 1; } 100% { stroke-dashoffset: -50; opacity: 0.5; } }
                        @keyframes shake-sync { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-1px); } 75% { transform: translateX(1px); } }
                        @keyframes scan-move { 0% { transform: translateY(-8px); } 100% { transform: translateY(8px); } }
                        @keyframes glitch-sync { 
                            0%, 90%, 100% { transform: translate(0); }
                            92% { transform: translate(-2px, 1px); color: #ff003c; }
                            95% { transform: translate(2px, -1px); color: #00ffff; }
                        }

                        #svg-sync .main-path { 
                            stroke: #00ff41; fill: none; stroke-width: 1.5; 
                            stroke-linecap: square; filter: url(#glow-sync);
                            transform-origin: center;
                        }
                        #svg-sync .anim-spin { animation: spin-sync 10s linear infinite; }
                        #svg-sync .anim-pulse { animation: pulse-sync 3s ease-in-out infinite; }
                        #svg-sync .anim-float { animation: float-sync 4s ease-in-out infinite; }
                        #svg-sync .anim-blink { animation: blink-sync 2s steps(2) infinite; }
                        #svg-sync .anim-draw { stroke-dasharray: 50; animation: draw-sync 4s linear infinite; }
                        #svg-sync .anim-shake { animation: shake-sync 0.2s infinite; }
                        #svg-sync .scan-line-anim { animation: scan-move 2s ease-in-out infinite; }
                        #svg-sync .anim-glitch { animation: glitch-sync 3s infinite; }
                    </style>
                </defs>
                <g class="main-path anim-spin">
                    <circle cx="12" cy="12" r="9" stroke-dasharray="4 4"/><circle cx="12" cy="12" r="5"/><path d="M12 2v4M12 18v4M2 12h4M18 12h4" stroke-width="1.5"/>
                </g>
            </svg>