<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" id="svg-inventory" width="100%" height="100%">
                <defs>
                    <filter id="glow-inventory">
                        <feGaussianBlur stdDeviation="1.5" result="blur" />
                        <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
                    </filter>
                    <style>
                        @keyframes spin-inventory { 100% { transform: rotate(360deg); } }
                        @keyframes pulse-inventory { 0%, 100% { transform: scale(1); opacity: 0.7; } 50% { transform: scale(1.1); opacity: 1; } }
                        @keyframes float-inventory { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-3px); } }
                        @keyframes blink-inventory { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
                        @keyframes draw-inventory { 0% { stroke-dashoffset: 50; opacity: 0.5; } 50% { stroke-dashoffset: 0; opacity: 1; } 100% { stroke-dashoffset: -50; opacity: 0.5; } }
                        @keyframes shake-inventory { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-1px); } 75% { transform: translateX(1px); } }
                        @keyframes scan-move { 0% { transform: translateY(-8px); } 100% { transform: translateY(8px); } }
                        @keyframes glitch-inventory { 
                            0%, 90%, 100% { transform: translate(0); }
                            92% { transform: translate(-2px, 1px); color: #ff003c; }
                            95% { transform: translate(2px, -1px); color: #00ffff; }
                        }

                        #svg-inventory .main-path { 
                            stroke: #00ff41; fill: none; stroke-width: 1.5; 
                            stroke-linecap: square; filter: url(#glow-inventory);
                            transform-origin: center;
                        }
                        #svg-inventory .anim-spin { animation: spin-inventory 10s linear infinite; }
                        #svg-inventory .anim-pulse { animation: pulse-inventory 3s ease-in-out infinite; }
                        #svg-inventory .anim-float { animation: float-inventory 4s ease-in-out infinite; }
                        #svg-inventory .anim-blink { animation: blink-inventory 2s steps(2) infinite; }
                        #svg-inventory .anim-draw { stroke-dasharray: 50; animation: draw-inventory 4s linear infinite; }
                        #svg-inventory .anim-shake { animation: shake-inventory 0.2s infinite; }
                        #svg-inventory .scan-line-anim { animation: scan-move 2s ease-in-out infinite; }
                        #svg-inventory .anim-glitch { animation: glitch-inventory 3s infinite; }
                    </style>
                </defs>
                <g class="main-path anim-float">
                    <path d="M3 8l9-5 9 5v8l-9 5-9-5z"/><path d="M12 22V12M3 8l9 5 9-5M12 12l9-5M12 12L3 8"/>
                </g>
            </svg>