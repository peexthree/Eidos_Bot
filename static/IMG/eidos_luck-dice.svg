<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
    <!-- Общая левитация куба -->
    <g>
        <animateTransform attributeName="transform" type="translate" values="0,-3; 0,3; 0,-3" dur="4s" repeatCount="indefinite" />
        
        <!-- Внешний изометрический контур (Шестиугольник) -->
        <polygon points="50,10 85,30 85,70 50,90 15,70 15,30" fill="none" stroke="currentColor" stroke-width="4" stroke-linejoin="round"/>
        <!-- Внутренние грани куба -->
        <polyline points="50,50 50,90" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round"/>
        <polyline points="50,50 15,30" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round"/>
        <polyline points="50,50 85,30" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round"/>
        
        <!-- Цифровые узлы (Квантовое мерцание) -->
        <!-- Верхняя грань (1) -->
        <circle cx="50" cy="30" r="4.5" fill="currentColor">
            <animate attributeName="opacity" values="0.3;1;0.3" dur="1.5s" repeatCount="indefinite" />
        </circle>
        
        <!-- Левая грань (2) -->
        <circle cx="30" cy="50" r="3.5" fill="currentColor">
            <animate attributeName="opacity" values="0.2;1;0.2" dur="2.1s" begin="0.5s" repeatCount="indefinite" />
        </circle>
        <circle cx="40" cy="65" r="3.5" fill="currentColor">
            <animate attributeName="opacity" values="0.2;1;0.2" dur="2.1s" begin="1.1s" repeatCount="indefinite" />
        </circle>
        
        <!-- Правая грань (3) -->
        <circle cx="70" cy="45" r="3.5" fill="currentColor">
            <animate attributeName="opacity" values="0.1;0.9;0.1" dur="1.8s" begin="0.2s" repeatCount="indefinite" />
        </circle>
        <circle cx="60" cy="60" r="3.5" fill="currentColor">
            <animate attributeName="opacity" values="0.1;0.9;0.1" dur="1.8s" begin="0.8s" repeatCount="indefinite" />
        </circle>
        <circle cx="80" cy="55" r="3.5" fill="currentColor">
            <animate attributeName="opacity" values="0.1;0.9;0.1" dur="1.8s" begin="1.4s" repeatCount="indefinite" />
        </circle>
    </g>
</svg>
