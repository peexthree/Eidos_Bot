
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="100%" height="100%">
                    <defs>
                        <style>
                            @keyframes roll { 0% { transform: rotate(0deg) scale(1); } 50% { transform: rotate(180deg) scale(1.1); } 100% { transform: rotate(360deg) scale(1); } }
                            @keyframes float-dice { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
                            .anim-luck { animation: float-dice 3s ease-in-out infinite; transform-origin: center; }
                            .anim-spin-fast { animation: roll 5s linear infinite; transform-origin: center; }
                        </style>
                    </defs>
                    <g class="anim-luck" stroke="#00ff41" fill="none" stroke-width="1.2">
                        <g class="anim-spin-fast">
                            <rect x="4" y="4" width="16" height="16" rx="2"></rect>
                            <circle cx="8" cy="8" r="1.2" fill="#00ff41"></circle>
                            <circle cx="16" cy="16" r="1.2" fill="#00ff41"></circle>
                            <circle cx="12" cy="12" r="1.2" fill="#00ff41"></circle>
                            <circle cx="16" cy="8" r="1.2" fill="#00ff41"></circle>
                            <circle cx="8" cy="16" r="1.2" fill="#00ff41"></circle>
                        </g>
                        <path d="M 2 2 L 6 2 M 2 2 L 2 6" opacity="0.4"></path>
                        <path d="M 22 22 L 18 22 M 22 22 L 22 18" opacity="0.4"></path>
                    </g>
                </svg>
