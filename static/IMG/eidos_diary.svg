<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" id="svg-diary" width="100%" height="100%">
                <defs>
                    <filter id="glow-diary">
                        <feGaussianBlur stdDeviation="1.5" result="blur" />
                        <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
                    </filter>
                    <style>
                        @keyframes spin-diary { 100% { transform: rotate(360deg); } }
                        @keyframes pulse-diary { 0%, 100% { transform: scale(1); opacity: 0.7; } 50% { transform: scale(1.1); opacity: 1; } }
                        @keyframes float-diary { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-3px); } }
                        @keyframes blink-diary { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
                        @keyframes draw-diary { 0% { stroke-dashoffset: 50; opacity: 0.5; } 50% { stroke-dashoffset: 0; opacity: 1; } 100% { stroke-dashoffset: -50; opacity: 0.5; } }
                        @keyframes shake-diary { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-1px); } 75% { transform: translateX(1px); } }
                        @keyframes scan-move { 0% { transform: translateY(-8px); } 100% { transform: translateY(8px); } }
                        @keyframes glitch-diary { 
                            0%, 90%, 100% { transform: translate(0); }
                            92% { transform: translate(-2px, 1px); color: #ff003c; }
                            95% { transform: translate(2px, -1px); color: #00ffff; }
                        }

                        #svg-diary .main-path { 
                            stroke: #00ff41; fill: none; stroke-width: 1.5; 
                            stroke-linecap: square; filter: url(#glow-diary);
                            transform-origin: center;
                        }
                        #svg-diary .anim-spin { animation: spin-diary 10s linear infinite; }
                        #svg-diary .anim-pulse { animation: pulse-diary 3s ease-in-out infinite; }
                        #svg-diary .anim-float { animation: float-diary 4s ease-in-out infinite; }
                        #svg-diary .anim-blink { animation: blink-diary 2s steps(2) infinite; }
                        #svg-diary .anim-draw { stroke-dasharray: 50; animation: draw-diary 4s linear infinite; }
                        #svg-diary .anim-shake { animation: shake-diary 0.2s infinite; }
                        #svg-diary .scan-line-anim { animation: scan-move 2s ease-in-out infinite; }
                        #svg-diary .anim-glitch { animation: glitch-diary 3s infinite; }
                    </style>
                </defs>
                <g class="main-path anim-blink">
                    <path d="M4 4h16v16H4z"/><path d="M8 8h8M8 12h8M8 16h5" stroke-width="1.5"/>
                </g>
            </svg>