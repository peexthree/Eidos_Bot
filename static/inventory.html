<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>EIDOS: Синхронизация</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">

    <style>
                :root {
            --bg-color: var(--tg-theme-bg-color, #050507);
            --text-main: var(--tg-theme-text-color, #e0f7fa);
            --neon-blue: var(--tg-theme-button-color, #00f3ff);
            --btn-text: var(--tg-theme-button-text-color, #000);
            --card-bg: var(--tg-theme-secondary-bg-color, rgba(10, 15, 30, 0.6));
            --hint-color: var(--tg-theme-hint-color, rgba(255, 255, 255, 0.5));
            --neon-purple: #bc13fe;
        }

                body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Rajdhani', sans-serif;
            margin: 0;
            padding: 20px;
            padding-bottom: 80px;
            min-height: 100vh;
            overflow-x: hidden;
            user-select: none;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
            position: relative;
        }

        h1 {
            font-size: 24px;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--neon-blue);
            text-shadow: 0 0 10px rgba(0, 243, 255, 0.5);
        }

        .status-bar {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.5);
            margin-top: 5px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

                .tabs-container {
            position: sticky;
            top: 0;
            z-index: 10;
            background: var(--bg-color);
            padding: 10px 0;
            margin: -10px -20px 20px -20px;
            padding-left: 20px;
            padding-right: 20px;
            border-bottom: 1px solid var(--hint-color);
        }

        .tabs {
            display: flex;
            overflow-x: auto;
            gap: 10px;
            scrollbar-width: none;
        }

        .tabs::-webkit-scrollbar {
            display: none;
        }

        .tab {
            padding: 8px 16px;
            border-radius: 20px;
            background: var(--card-bg);
            border: 1px solid var(--hint-color);
            color: var(--text-main);
            white-space: nowrap;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
        }

        .tab.active {
            background: rgba(0, 243, 255, 0.2);
            border-color: var(--neon-blue);
            color: var(--neon-blue);
            box-shadow: 0 0 10px rgba(0, 243, 255, 0.3);
        }

        #loading {
            text-align: center;
            color: var(--neon-blue);
            font-size: 16px;
            animation: pulse 1.5s infinite;
            margin-top: 50px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

                .item-grid {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
        }

        .item-card {
            background: var(--card-bg);
            border: 1px solid var(--hint-color);
            border-radius: 12px;
            padding: 10px;
            text-align: left;
            backdrop-filter: blur(5px);
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
            opacity: 0;
            transform: translateY(10px);
            animation: slideUp 0.3s forwards;
            cursor: pointer;
            display: flex;
            flex-direction: row;
            justify-content: flex-start;
            align-items: center;
            width: 100%;
            box-sizing: border-box;
        }

        .item-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, currentColor, transparent);
            opacity: 0.5;
        }

        .item-card:active {
            transform: scale(0.95);
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.3);
        }


        .item-icon {
            font-size: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 50px;
            height: 50px;
            min-width: 50px;
            border-radius: 8px;
            margin-right: 15px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            overflow: hidden;
        }

        .item-icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .item-details {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            overflow: hidden;
        }

        .item-rarity-label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 2px;
        }

        .item-action-icon {
            margin-left: 10px;
            color: var(--neon-blue);
            font-size: 18px;
            opacity: 0.7;
        }


        .item-name {
            font-size: 15px;
            font-weight: 700;
            color: var(--text-main);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 0;
        }

        .item-quantity {
            display: inline-block;
            background: rgba(255, 255, 255, 0.1);
            color: #ccc;
            padding: 2px 8px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 700;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .doll-grid {
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
        }

        .doll-slot {
            width: 80%;
            background: rgba(10, 15, 30, 0.8);
            border: 1px solid rgba(0, 243, 255, 0.2);
            border-radius: 12px;
            padding: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: relative;
            cursor: pointer;
            transition: 0.2s;
        }

        .doll-slot:active {
            transform: scale(0.98);
        }

        .slot-title {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: rgba(255,255,255,0.4);
            position: absolute;
            top: 5px;
            left: 10px;
        }

        .slot-content {
            margin-top: 15px;
            text-align: right;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }

        .slot-content img {
            width: 40px;
            height: 40px;
            object-fit: cover;
            border-radius: 6px;
            margin-bottom: 5px;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px);
            z-index: 100;
            justify-content: center;
            align-items: flex-end;
            animation: fadeIn 0.2s;
        }

        .modal-content {
            background: var(--bg-color);
            width: 100%;
            border-top-left-radius: 24px;
            border-top-right-radius: 24px;
            padding: 30px 20px;
            border-top: 1px solid var(--neon-blue);
            box-shadow: 0 -10px 30px rgba(0, 243, 255, 0.2);
            transform: translateY(100%);
            animation: slideUpModal 0.3s forwards;
            position: relative;
        }

        .modal-close {
            position: absolute;
            top: 15px;
            right: 20px;
            color: rgba(255,255,255,0.5);
            font-size: 20px;
            cursor: pointer;
        }

        .modal-icon {
            font-size: 48px;
            text-align: center;
            margin-bottom: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .modal-icon img {
            max-width: 150px;
            max-height: 150px;
            border-radius: 12px;
            object-fit: cover;
            border: 2px solid rgba(255, 255, 255, 0.2);
        }

        .modal-name {
            font-size: 22px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .modal-rarity {
            text-align: center;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 20px;
        }

        .modal-desc {
            font-size: 14px;
            color: var(--text-main);
            line-height: 1.5;
            margin-bottom: 30px;
            background: rgba(0,0,0,0.5);
            padding: 15px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .modal-actions {
            display: flex;
            gap: 10px;
        }

        .action-btn {
            flex: 1;
            padding: 15px;
            background: rgba(0, 243, 255, 0.1);
            border: 1px solid var(--neon-blue);
            color: var(--neon-blue);
            border-radius: 12px;
            font-family: 'Rajdhani', sans-serif;
            font-weight: bold;
            font-size: 16px;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: 0.2s;
        }

        .action-btn:active {
            background: var(--neon-blue);
            color: var(--btn-text);
        }

        .action-btn-danger {
            border-color: #ff003c;
            color: #ff003c;
            background: rgba(255, 0, 60, 0.1);
        }

        .action-btn-danger:active {
            background: #ff003c;
            color: var(--btn-text);
        }

        @keyframes pulse {
            0% { opacity: 0.5; text-shadow: 0 0 5px var(--neon-blue); }
            50% { opacity: 1; text-shadow: 0 0 20px var(--neon-blue); }
            100% { opacity: 0.5; text-shadow: 0 0 5px var(--neon-blue); }
        }

        @keyframes slideUp {
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideUpModal {
            to { transform: translateY(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .profile-btn {
            position: absolute;
            top: 15px;
            right: 20px;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid var(--neon-blue);
            overflow: hidden;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(0, 243, 255, 0.3);
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.2s;
            z-index: 20;
        }

        .profile-btn:active {
            transform: scale(0.9);
        }

        .profile-btn img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .profile-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            z-index: 200;
            justify-content: center;
            align-items: center;
            animation: fadeIn 0.2s;
        }

        .profile-content {
            background: var(--card-bg);
            border: 1px solid var(--neon-blue);
            border-radius: 16px;
            padding: 25px;
            width: 85%;
            max-width: 350px;
            box-shadow: 0 0 30px rgba(0, 243, 255, 0.2);
            position: relative;
            text-align: center;
            transform: scale(0.9);
            animation: popIn 0.3s forwards;
        }

        @keyframes popIn {
            to { transform: scale(1); }
        }

        .profile-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 3px solid var(--neon-blue);
            margin: -60px auto 15px auto;
            background: var(--bg-color);
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.4);
            overflow: hidden;
        }

        .profile-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .profile-name {
            font-size: 20px;
            font-weight: bold;
            color: var(--text-main);
            margin-bottom: 5px;
            text-shadow: 0 0 5px rgba(255,255,255,0.3);
        }

        .profile-faction {
            font-size: 14px;
            color: var(--neon-blue);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 20px;
        }

        .profile-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 25px;
        }

        .stat-box {
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            padding: 10px;
        }

        .stat-val {
            font-size: 18px;
            font-weight: bold;
            color: var(--text-main);
            margin-bottom: 2px;
        }

        .stat-label {
            font-size: 10px;
            color: var(--hint-color);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

    </style>

</head>

<body>
    <div class="header">
        <h1>Инвентарь Осколка</h1>
        <div class="status-bar" id="status">Синхронизация с узлом...</div>
        <div class="profile-btn" onclick="openProfileModal()">
            <img id="header-avatar" src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%2300f3ff'><path d='M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z'/></svg>" alt="Profile">
        </div>
    </div>
    
    <div class="tabs-container">
        <div class="tabs">
            <div class="tab active" onclick="switchTab(event, 'doll')">Кукла</div>
            <div class="tab" onclick="switchTab(event, 'equip')">Снаряжение</div>
            <div class="tab" onclick="switchTab(event, 'software')">Софт</div>
            <div class="tab" onclick="switchTab(event, 'artifact')">Артефакты</div>
            <div class="tab" onclick="switchTab(event, 'consumable')">Расходники</div>
        </div>
    </div>

    <div id="loading">Дешифровка данных...</div>

    <div id="items-container">
        <div id="items" class="item-grid"></div>
    </div>

    <div id="doll-container" style="display: none;">
        <div class="doll-grid">
            <div class="doll-slot" id="slot-head" onclick="openUnequipModal('head')">
                <div class="slot-title">Голова</div>
                <div class="slot-content">Пусто</div>
            </div>
            <div class="doll-slot" id="slot-body" onclick="openUnequipModal('body')">
                <div class="slot-title">Тело</div>
                <div class="slot-content">Пусто</div>
            </div>
            <div class="doll-slot" id="slot-weapon" onclick="openUnequipModal('weapon')">
                <div class="slot-title">Оружие</div>
                <div class="slot-content">Пусто</div>
            </div>
            <div class="doll-slot" id="slot-software" onclick="openUnequipModal('software')">
                <div class="slot-title">Софт</div>
                <div class="slot-content">Пусто</div>
            </div>
            <div class="doll-slot" id="slot-artifact" onclick="openUnequipModal('artifact')">
                <div class="slot-title">Артефакт</div>
                <div class="slot-content">Пусто</div>
            </div>
        </div>
    </div>

    <!-- Modal for Profile Details -->
    <div id="profile-modal" class="profile-modal" onclick="if(event.target === this) closeProfileModal()">
        <div class="profile-content">
            <div class="modal-close" onclick="closeProfileModal()">✖</div>
            <div class="profile-avatar">
                <img id="modal-avatar" src="" alt="Avatar" onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 24 24\' fill=\'%2300f3ff\'><path d=\'M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z\'/></svg>'">
            </div>
            <div id="profile-name" class="profile-name">Загрузка...</div>
            <div id="profile-faction" class="profile-faction">---</div>

            <div class="profile-stats">
                <div class="stat-box">
                    <div id="profile-lvl" class="stat-val">0</div>
                    <div class="stat-label">Уровень</div>
                </div>
                <div class="stat-box">
                    <div id="profile-xp" class="stat-val">0</div>
                    <div class="stat-label">EXP</div>
                </div>
                <div class="stat-box" style="grid-column: span 2;">
                    <div id="profile-biocoin" class="stat-val" style="color: #ffb700;">0</div>
                    <div class="stat-label">BioCoin</div>
                </div>
            </div>

            <button class="action-btn" onclick="closeProfileModal()">ЗАКРЫТЬ ДОСЬЕ</button>
        </div>
    </div>

    <!-- Modal for Item Details -->
    <div id="item-modal" class="modal">
        <div class="modal-content">
            <div class="modal-close" onclick="closeModal()">✖</div>
            <div id="modal-icon" class="modal-icon">📦</div>
            <div id="modal-name" class="modal-name">Название</div>
            <div id="modal-rarity" class="modal-rarity">Обычный</div>
            <div id="modal-desc" class="modal-desc">Описание предмета...</div>
            <div class="modal-actions" id="modal-actions">
                <button class="action-btn" onclick="equipItem()">Экипировать</button>
            </div>
        </div>
    </div>

    <script>
                const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        if (tg.setHeaderColor) {
            tg.setHeaderColor('bg_color');
        }
        if (tg.setBackgroundColor) {
            tg.setBackgroundColor('bg_color');
        }

        tg.MainButton.setText('ЗАКРЫТЬ ИНВЕНТАРЬ');
        tg.MainButton.show();
        tg.MainButton.onClick(() => {
            tg.close();
        });

        const fallbackIcons = {
            'chip': '💾', 'decoder': '📟', 'energy': '⚡', 'default': '📦',
            'weapon': '🔫', 'head': '🪖', 'body': '🛡️', 'software': '💿', 'artifact': '🔮', 'misc': '⚙️'
        };

        const rarityColors = {
            'common': '#a0a0a0',
            'rare': '#0088ff',
            'epic': '#bc13fe',
            'legendary': '#ffb700',
            'unique': '#ff003c'
        };

        const rarityNames = {
            'common': 'Обычный',
            'rare': 'Редкий',
            'epic': 'Эпический',
            'legendary': 'Легендарный',
            'unique': 'Уникальный'
        };

        let currentInventory = [];
        let currentEquipped = {};
        let selectedItem = null;
        let selectedSlot = null;
        let currentProfile = null;

        // Use user ID from TG init data, default to fallback for web testing
        const uid = tg.initDataUnsafe?.user?.id || new URLSearchParams(window.location.search).get('uid');

        async function loadInventory() {
            if (!uid) {
                document.getElementById('loading').innerText = 'ОШИБКА: НЕТ UID';
                return;
            }
            
            try {
                const response = await fetch(`/api/inventory?uid=${uid}`);
                const data = await response.json();
                
                if(data.error) {
                    throw new Error(data.error);
                }

                currentInventory = data.items || [];
                currentEquipped = data.equipped || {};

                if (data.profile) {
                    currentProfile = data.profile;
                    if (data.profile.avatar_url) {
                        document.getElementById('header-avatar').src = data.profile.avatar_url;
                    }
                }

                document.getElementById('loading').style.display = 'none';
                document.getElementById('status').innerText = 'Синхронизация завершена';
                
                switchTab({currentTarget: document.querySelector('.tab')}, 'doll');
                renderDoll();

            } catch (e) {
                document.getElementById('loading').innerText = 'ОШИБКА СИНХРОНИЗАЦИИ';
                document.getElementById('loading').style.color = '#ff003c';
            }
        }

        function openProfileModal() {
            if (!currentProfile) return;
            tg.HapticFeedback.impactOccurred('medium');

            document.getElementById('profile-name').innerHTML = currentProfile.name;
            document.getElementById('profile-faction').innerText = currentProfile.faction;
            document.getElementById('profile-lvl').innerText = currentProfile.level;
            document.getElementById('profile-xp').innerText = currentProfile.xp.toLocaleString('ru-RU');
            document.getElementById('profile-biocoin').innerText = currentProfile.biocoin.toLocaleString('ru-RU');

            if (currentProfile.avatar_url) {
                document.getElementById('modal-avatar').src = currentProfile.avatar_url;
            }

            document.getElementById('profile-modal').style.display = 'flex';
        }

        function closeProfileModal() {
            document.getElementById('profile-modal').style.display = 'none';
        }

        function switchTab(event, tabType) {
            tg.HapticFeedback.impactOccurred('light');

            // Update active tab styling
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.currentTarget.classList.add('active');

            if (tabType === 'doll') {
                document.getElementById('items-container').style.display = 'none';
                document.getElementById('doll-container').style.display = 'block';
            } else {
                document.getElementById('doll-container').style.display = 'none';
                document.getElementById('items-container').style.display = 'block';
                renderInventory(tabType);
            }
        }

        function renderInventory(filter) {
            const itemsDiv = document.getElementById('items');
            itemsDiv.innerHTML = '';

            let filtered = currentInventory;
            if (filter !== 'all') {
                if (filter === 'equip') {
                    filtered = currentInventory.filter(i => ['weapon', 'equip', 'armor', 'head', 'body'].includes(i.type));
                } else if (filter === 'consumable') {
                    filtered = currentInventory.filter(i => ['consumable', 'misc'].includes(i.type));
                } else {
                    filtered = currentInventory.filter(i => i.type === filter);
                }
            }

            if (filtered.length === 0) {
                itemsDiv.innerHTML = '<div style="text-align: center; color: rgba(255,255,255,0.5); width: 100%;">Ничего не найдено</div>';
                return;
            }

            filtered.forEach((item, index) => {
                const itemEl = document.createElement('div');
                itemEl.className = 'item-card';
                itemEl.style.animationDelay = `${index * 0.05}s`;

                const color = rarityColors[item.rarity || 'common'];
                itemEl.style.borderColor = color;

                const displayName = item.name || item.item_id || 'Неизвестный фрагмент';
                const icon = fallbackIcons[item.type] || fallbackIcons['default'];

                const rName = rarityNames[item.rarity || 'common'];

                let iconHtml = `<span style="color:${color}">${icon}</span>`;
                if (item.image_url) {
                    iconHtml = `<img src="${item.image_url}" alt="icon" onerror="this.outerHTML='<span style=\\'color:${color}\\'>${icon}</span>'" style="width:100%; height:100%; object-fit:contain;">`;
                }

                itemEl.innerHTML = `
                    <div class="item-icon">${iconHtml}</div>
                    <div class="item-info-block">
                        <div class="item-rarity-label" style="color:${color}">${rName}</div>
                        <div class="item-name">${displayName}</div>
                    </div>
                    <div class="item-quantity">x${item.quantity}</div>
                    <div class="item-action-icon">›</div>
                `;

                itemEl.onclick = () => {
                    tg.HapticFeedback.impactOccurred('medium');
                    openModal(item);
                };

                itemsDiv.appendChild(itemEl);
            });
        }

        function renderDoll() {
            const slots = ['head', 'body', 'weapon', 'software', 'artifact'];
            slots.forEach(slot => {
                const slotEl = document.getElementById(`slot-${slot}`);
                const item = currentEquipped[slot];

                if (item) {
                    const color = rarityColors[item.rarity || 'common'];
                    const icon = fallbackIcons[item.type] || fallbackIcons['default'];
                    let iconHtml = `<span style="color:${color}; font-size:24px;">${icon}</span>`;
                    if (item.image_url) {
                        iconHtml = `<img src="${item.image_url}" alt="icon" onerror="this.outerHTML='<span style=\\'color:${color}; font-size:24px;\\'>${icon}</span>'">`;
                    }

                    slotEl.querySelector('.slot-content').innerHTML = `
                        ${iconHtml}
                        <span style="color:${color}; font-weight:bold;">${item.name}</span>
                    `;
                    slotEl.style.borderColor = color;
                } else {
                    slotEl.querySelector('.slot-content').innerHTML = `
                        <span style="opacity:0.5; font-size:24px;">⬛</span><br>
                        <span style="opacity:0.5;">Пусто</span>
                    `;
                    slotEl.style.borderColor = 'rgba(0, 243, 255, 0.2)';
                }
            });
        }

        function openModal(item) {
            selectedItem = item;
            const modal = document.getElementById('item-modal');
            const color = rarityColors[item.rarity || 'common'];

            const icon = fallbackIcons[item.type] || fallbackIcons['default'];
            if (item.image_url) {
                document.getElementById('modal-icon').innerHTML = `<img src="${item.image_url}" onerror="this.outerHTML='<span style=\\'color:${color}\\'>${icon}</span>'" style="border-color:${color}">`;
            } else {
                document.getElementById('modal-icon').innerHTML = `<span style="color:${color}">${icon}</span>`;
            }
            document.getElementById('modal-name').innerText = item.name;
            document.getElementById('modal-name').style.color = color;

            const rName = rarityNames[item.rarity || 'common'];
            document.getElementById('modal-rarity').innerText = rName;
            document.getElementById('modal-rarity').style.color = color;

            document.getElementById('modal-desc').innerText = item.desc || "Описание отсутствует.";

            const actionsDiv = document.getElementById('modal-actions');
            actionsDiv.innerHTML = '';

            if (['weapon', 'head', 'body', 'software', 'artifact'].includes(item.type)) {
                actionsDiv.innerHTML = `<button class="action-btn" onclick="equipItem()">УСТАНОВИТЬ В СЛОТ</button>`;
            }
            // add consumable support if needed later

            modal.style.display = 'flex';
        }

        function openUnequipModal(slot) {
            const item = currentEquipped[slot];
            if (!item) return;

            selectedSlot = slot;
            const modal = document.getElementById('item-modal');
            const color = rarityColors[item.rarity || 'common'];

            const icon = fallbackIcons[item.type] || fallbackIcons['default'];
            if (item.image_url) {
                document.getElementById('modal-icon').innerHTML = `<img src="${item.image_url}" onerror="this.outerHTML='<span style=\\'color:${color}\\'>${icon}</span>'" style="border-color:${color}">`;
            } else {
                document.getElementById('modal-icon').innerHTML = `<span style="color:${color}">${icon}</span>`;
            }
            document.getElementById('modal-name').innerText = item.name;
            document.getElementById('modal-name').style.color = color;

            const rName = rarityNames[item.rarity || 'common'];
            document.getElementById('modal-rarity').innerText = rName;
            document.getElementById('modal-rarity').style.color = color;

            document.getElementById('modal-desc').innerText = item.desc || "Описание отсутствует.";

            const actionsDiv = document.getElementById('modal-actions');
            actionsDiv.innerHTML = `<button class="action-btn action-btn-danger" onclick="unequipItem()">СНЯТЬ</button>`;

            modal.style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('item-modal').style.display = 'none';
            selectedItem = null;
            selectedSlot = null;
        }

        async function equipItem() {
            if (!selectedItem) return;
            tg.HapticFeedback.notificationOccurred('success');

            const btn = document.querySelector('.action-btn');
            btn.innerText = 'Загрузка...';
            btn.disabled = true;

            try {
                const res = await fetch('/api/inventory/equip', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({uid: uid, item_id: selectedItem.item_id, inv_id: selectedItem.id})
                });
                const data = await res.json();

                if (data.success) {
                    closeModal();
                    await loadInventory(); // Reload
                } else {
                    alert('Ошибка: ' + data.error);
                }
            } catch (e) {
                alert('Сбой сети.');
            }
        }
        
        async function unequipItem() {
            if (!selectedSlot) return;
            tg.HapticFeedback.notificationOccurred('success');

            const btn = document.querySelector('.action-btn');
            btn.innerText = 'Загрузка...';
            btn.disabled = true;

            try {
                const res = await fetch('/api/inventory/unequip', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({uid: uid, slot: selectedSlot})
                });
                const data = await res.json();

                if (data.success) {
                    closeModal();
                    await loadInventory(); // Reload
                } else {
                    alert('Ошибка: ' + data.error);
                }
            } catch (e) {
                alert('Сбой сети.');
            }
        }

        loadInventory();
    </script>
</body>

</html>
