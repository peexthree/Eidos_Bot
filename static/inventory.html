<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Eidos Inventory</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Loading Screen -->
    <div id="loading-overlay">
        <div class="spinner"></div>
        <div style="color: var(--tg-theme-hint-color); font-size: 14px; letter-spacing: 2px;">СИНХРОНИЗАЦИЯ...</div>
    </div>

    <!-- Profile & Stats Dashboard -->
    <div class="profile-header">
        <div class="profile-info">
            <img id="profile-avatar" class="avatar" src="https://via.placeholder.com/60" alt="Avatar">
            <div class="user-details">
                <h2 id="profile-name">Загрузка...</h2>
                <p><span id="profile-lvl">Lvl 0</span> | <span id="profile-faction">Н/Д</span></p>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-item">
                <span>ATK</span>
                <div id="stat-atk" style="color: #ff3333;">0</div>
            </div>
            <div class="stat-item">
                <span>DEF</span>
                <div id="stat-def" style="color: #33ccff;">0</div>
            </div>
            <div class="stat-item">
                <span>LUCK</span>
                <div id="stat-luck" style="color: #ffcc00;">0</div>
            </div>
        </div>

        <div class="progress-container">
            <div id="xp-bar" class="progress-bar"></div>
            <div id="xp-text" class="progress-text">0 / 0 XP</div>
        </div>
    </div>

    <!-- Interactive Equipment Slots (Doll) -->
    <div class="doll-container" id="doll-container">
        <!-- Grid layout for the 5 slots -->
        <div class="equip-slot" id="slot-head" style="grid-column: 1 / span 2; max-width: 50%; margin: 0 auto;"></div>
        <div class="equip-slot" id="slot-weapon"></div>
        <div class="equip-slot" id="slot-body"></div>
        <div class="equip-slot" id="slot-software"></div>
        <div class="equip-slot" id="slot-artifact"></div>
    </div>

    <!-- Tabs Menu -->
    <div class="tabs">
        <div class="tab active" data-filter="all">ВСЕ</div>
        <div class="tab" data-filter="equip">ЭКИПИРОВКА</div>
        <div class="tab" data-filter="consumable">РАСХОДНИКИ</div>
        <div class="tab" data-filter="shop" style="color: var(--rarity-legendary);">МАГАЗИН</div>
    </div>

    <!-- Inventory List Area -->
    <div class="items-list" id="inventory-list">
        <!-- Rendered via JS -->
    </div>

    <!-- Modal for Items -->
    <div class="modal-overlay" id="item-modal">
        <div class="modal-content">
            <div class="modal-close" id="modal-close">×</div>
            <div class="modal-icon" id="modal-icon"></div>
            <div class="modal-title" id="modal-title">Название</div>
            <div class="modal-rarity" id="modal-rarity" style="font-size: 11px; margin-bottom: 10px;">Редкость</div>
            <div class="modal-desc" id="modal-desc">Описание</div>
            <div class="modal-actions" id="modal-actions">
                <!-- Action Buttons Rendered via JS -->
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
