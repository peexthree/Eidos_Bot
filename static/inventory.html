<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>EIDOS | TERMINAL</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div id="eidos-loader" onclick="forceCloseLoader()">
        <video src="video/LOGO.mp4" autoplay muted playsinline></video>
        <div class="loader-overlay-text">ПОДКЛЮЧЕНИЕ К НЕЙРОСЕТИ...</div>
    </div>

    <div class="sys-background">
        <div class="sys-scanline"></div>
        <div class="nexus-grid-container"><div class="nexus-grid-plane"></div></div>
        <div class="nexus-particles" id="p-box"></div>
    </div>

    <div id="loading-overlay" class="sys-boot-overlay">
        <div class="boot-content">
            <svg class="sys-boot-core" viewBox="0 0 100 100">
                <circle class="sys-spin-cw" cx="50" cy="50" r="45" fill="none" stroke="#00ff41" stroke-width="1" stroke-dasharray="10 5" opacity="0.4"/>
                <circle class="sys-spin-ccw" cx="50" cy="50" r="35" fill="none" stroke="#00ffff" stroke-width="2" stroke-dasharray="20 10"/>
                <circle cx="50" cy="50" r="5" fill="#00ff41">
                    <animate attributeName="opacity" values="1;0.2;1" dur="1s" repeatCount="indefinite" />
                </circle>
            </svg>
            <div class="sys-title">EIDOS<span>_INTERFACE</span></div>
            <div class="sys-progress-box"><div id="sys-progress" class="sys-progress-bar"></div></div>
            <div id="progress-text" class="sys-progress-text">DECRYPTING: 0%</div>
        </div>
    </div>

    <header class="stats-header">
        <div class="stats-grid">
            <div class="stat-box" data-label="ATK">
                <span class="stat-icon">⚔️</span>
                <div id="stat-atk" class="stat-value text-red">0</div>
            </div>
            <div class="stat-box" data-label="DEF">
                <span class="stat-icon">🛡️</span>
                <div id="stat-def" class="stat-value text-blue">0</div>
            </div>
            <div class="stat-box" data-label="LUCK">
                <span class="stat-icon">🎲</span>
                <div id="stat-luck" class="stat-value text-gold">0</div>
            </div>
            <div class="stat-box" data-label="SIGNAL">
                <span class="stat-icon">📡</span>
                <div id="stat-signal" class="stat-value text-green">100%</div>
            </div>
        </div>
        <div class="xp-container">
            <div id="xp-bar" class="xp-fill"></div>
            <div id="xp-text" class="xp-label">0 / 0 XP</div>
        </div>
    </header>

    <main id="views-container">


        <section id="view-nexus" class="view active">
            <div id="nexus-grid-content" class="nexus-grid"></div>
        </section>

        <section id="view-inventory" class="view">
            
            <div class="profile-card">
                <div class="avatar-wrapper">
                    <img id="profile-avatar" src="IMG/default_avatar.png" alt="User">
                    <div class="lvl-badge" id="profile-lvl">1</div>
                </div>
                <div class="profile-text">
                    <h2 id="profile-name">IDENTIFYING...</h2>
                    <p id="profile-faction">FACTION: NEUTRAL</p>
                    <div class="currency-display">
                        <span id="profile-biocoins">0</span> <small>BIOCOINS</small>
                    </div>
                </div>
            </div>

            <div class="doll-grid">
                <div class="doll-slot head" id="slot-head" title="Head"></div>
                <div class="doll-slot weapon" id="slot-weapon" title="Weapon"></div>
                <div class="doll-slot body" id="slot-body" title="Body"></div>
                <div class="doll-slot software" id="slot-software" title="Software"></div>
                <div class="doll-slot artifact" id="slot-artifact" title="Artifact"></div>
            </div>

            <div class="filter-tabs">
                <button class="tab-btn active" data-filter="all">ВСЕ</button>
                <button class="tab-btn" data-filter="equip">СНАРЯЖЕНИЕ</button>
                <button class="tab-btn" data-filter="consumable">РАСХОДНИКИ</button>
            </div>

            <div class="scroll-area" id="inventory-list">
                </div>
        </section>

        <section id="view-shop" class="view">
            <div class="section-header">ТОРГОВЫЙ ШЛЮЗ</div>
            <div class="scroll-area" id="shop-list"></div>
        </section>

        <section id="view-social" class="view">
            <div class="sub-tabs">
                <div class="tab-btn active" data-social-tab="leaderboard">СЕТЬ</div>
                <div class="tab-btn" data-social-tab="ai">ЭЙДОС</div>
            </div>
            <div id="social-leaderboard" class="scroll-area">
                <div id="leaderboard-list"></div>
            </div>
            <div id="social-ai" style="display: none;">
                <div class="ai-terminal-box">
                    <div id="ai-log" class="ai-screen"></div>
                    <button class="action-btn glow-purple" id="btn-dossier">АНАЛИЗ ОБЪЕКТА (100 BIOCOINS)</button>
                </div>
            </div>
        </section>

    </main>

    <footer class="action-log-terminal">
        <div class="log-line">
            <span class="log-tag">[SYS]</span>
            <span id="action-log-text">TERMINAL_READY</span>
        </div>
    </footer>


    <div class="modal-overlay" id="item-modal">
        <div class="modal-frame">
            <div class="modal-close" id="modal-close">×</div>
            <div id="modal-icon" class="modal-main-icon"></div>
            <h3 id="modal-title">OBJECT_NAME</h3>
            <div id="modal-rarity" class="rarity-tag">COMMON</div>
            <div id="modal-desc" class="modal-body">ERROR: NO_DATA</div>
            <div id="modal-actions" class="modal-footer"></div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
