<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" id="svg-tab-consum" width="100%" height="100%" class="w-full h-full">
                <defs>
                    <linearGradient id="grad-tab-consum" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#00ffff" />
                        <stop offset="100%" stop-color="#00ff41" />
                    </linearGradient>
                    <filter id="glow-tab-consum" x="-30%" y="-30%" width="160%" height="160%">
                        <feGaussianBlur stdDeviation="1.5" result="blur" />
                        <feMerge>
                            <feMergeNode in="blur" />
                            <feMergeNode in="SourceGraphic" />
                        </feMerge>
                    </filter>
                    <style>
                        @keyframes spin-tab-consum { 100% { transform: rotate(360deg); } }
                        @keyframes pulse-tab-consum { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); filter: brightness(1.3); } }
                        @keyframes float-tab-consum { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-3px); } }
                        @keyframes breathe-tab-consum { 0%, 100% { opacity: 0.6; stroke-width: 1.2; } 50% { opacity: 1; stroke-width: 1.8; filter: drop-shadow(0 0 4px #00ffff); } }
                        @keyframes draw-tab-consum { 0% { stroke-dashoffset: 60; } 50% { stroke-dashoffset: 0; } 100% { stroke-dashoffset: -60; } }
                        @keyframes blink-tab-consum { 0%, 50% { opacity: 1; stroke: #00ffff; } 51%, 100% { opacity: 0.4; stroke: url(#grad-tab-consum); } }
                        @keyframes shake-tab-consum { 0%, 80%, 100% { transform: rotate(0deg); } 85% { transform: rotate(-5deg); } 90% { transform: rotate(5deg); } 95% { transform: rotate(-5deg); } }
                        @keyframes wave-tab-consum { 0%, 100% { transform: scaleY(1); } 50% { transform: scaleY(1.2); } }
                        @keyframes glitch-heavy-tab-consum { 0%, 80%, 100% { transform: translate(0,0) scale(1); stroke: url(#grad-tab-consum); } 82% { transform: translate(-3px, 2px) scale(1.05); stroke: #ff003c; } 86% { transform: translate(3px, -2px) scale(0.95); stroke: #00ffff; } 88% { stroke: #ffffff; } }

                        #svg-tab-consum .core-anim { transform-origin: 12px 12px; animation: float-tab-consum 4s ease-in-out infinite; }
                    </style>
                </defs>
                <g stroke="url(#grad-tab-consum)" stroke-width="1.5" fill="none" stroke-linecap="square" stroke-linejoin="miter" class="core-anim" filter="url(#glow-tab-consum)">
                    <path d="M8 2 L16 2 L16 5 L14 7 L14 18 L16 20 L16 22 L8 22 L8 20 L10 18 L10 7 L8 5 Z"/><line x1="10" y1="12" x2="14" y2="12"/><circle cx="12" cy="15" r="1.5"/>
                </g>
            </svg>