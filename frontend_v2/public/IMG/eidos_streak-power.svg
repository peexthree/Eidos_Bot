<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" id="svg-streak-power" width="100%" height="100%">
                <defs>
                    <linearGradient id="grad-streak-power" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#00ff41" />
                        <stop offset="100%" stop-color="#00ffff" />
                    </linearGradient>
                    <filter id="glow-streak-power" x="-30%" y="-30%" width="160%" height="160%">
                        <feGaussianBlur stdDeviation="1" result="blur" />
                        <feMerge>
                            <feMergeNode in="blur" />
                            <feMergeNode in="SourceGraphic" />
                        </feMerge>
                    </filter>
                    <style>
                        /* ИНКАПСУЛИРОВАННАЯ ЛОГИКА ДВИЖЕНИЯ */
                        @keyframes spin-streak-power { 100% { transform: rotate(360deg); } }
                        @keyframes rev-spin-streak-power { 100% { transform: rotate(-360deg); } }
                        @keyframes pulse-streak-power { 0%, 100% { transform: scale(1); filter: brightness(1); } 50% { transform: scale(1.08); filter: brightness(1.3); } }
                        @keyframes pulse-fast-streak-power { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.15); filter: brightness(1.5); } }
                        @keyframes float-streak-power { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }
                        @keyframes glitch-streak-power { 0%, 90%, 100% { transform: translate(0,0) skew(0deg); stroke: url(#grad-streak-power); } 92% { transform: translate(-2px, 1px) skew(-5deg); stroke: #ff003c; } 96% { transform: translate(2px, -1px) skew(5deg); stroke: #00ffff; } }
                        @keyframes glitch-heavy-streak-power { 0%, 80%, 100% { transform: translate(0,0) scale(1); stroke: url(#grad-streak-power); } 82% { transform: translate(-4px, 2px) scale(1.1); stroke: #ff003c; } 86% { transform: translate(4px, -2px) scale(0.9); stroke: #00ffff; } 88% { stroke: #ffffff; } }
                        @keyframes draw-streak-power { 0% { stroke-dashoffset: 100; } 50% { stroke-dashoffset: 0; } 100% { stroke-dashoffset: -100; } }
                        @keyframes breathe-streak-power { 0%, 100% { opacity: 0.6; stroke-width: 1; } 50% { opacity: 1; stroke-width: 1.8; filter: drop-shadow(0 0 5px #00ff41); } }
                        @keyframes blink-streak-power { 0%, 50% { opacity: 1; stroke: #ff003c; } 51%, 100% { opacity: 0.3; stroke: url(#grad-streak-power); } }
                        @keyframes wave-streak-power { 0%, 100% { transform: scaleY(1); } 50% { transform: scaleY(1.3); } }
                        @keyframes shake-streak-power { 0%, 80%, 100% { transform: rotate(0deg); } 85% { transform: rotate(-8deg); } 90% { transform: rotate(8deg); } 95% { transform: rotate(-8deg); } }

                        #svg-streak-power .hud-spin { transform-origin: 12px 12px; animation: spin-streak-power 30s linear infinite; }
                        #svg-streak-power .core-anim { transform-origin: 12px 12px; stroke-dasharray: 100; animation: draw-streak-power 4s linear infinite; }
                    </style>
                </defs>
                <!-- Tactical HUD Grid (Фоновый слой сканирования) -->
                <g opacity="0.3" stroke="#00ffff" stroke-width="0.3" fill="none">
                    <g class="hud-spin">
                        <circle cx="12" cy="12" r="10" stroke-dasharray="1 4" />
                        <line x1="12" y1="0" x2="12" y2="24" stroke-dasharray="2 8" opacity="0.3" />
                        <line x1="0" y1="12" x2="24" y2="12" stroke-dasharray="2 8" opacity="0.3" />
                    </g>
                    <!-- Статичные углы калибровки -->
                    <path d="M 2 2 L 4 2 M 22 2 L 20 2 M 2 22 L 4 22 M 22 22 L 20 22 M 2 2 L 2 4 M 22 2 L 22 4 M 2 22 L 2 20 M 22 22 L 22 20" />
                </g>
                <!-- Основной динамический контур -->
                <g stroke="url(#grad-streak-power)" stroke-width="1.2" fill="none" stroke-linecap="square" stroke-linejoin="miter" class="core-anim" filter="url(#glow-streak-power)">
                    <polygon points="13,2 3,14 11,14 9,22 21,10 13,10"/>
                </g>
            </svg>